/* ── GROQ HELPER ── */
async function groqAsk(prompt,apiKey){
  const key=apiKey||localStorage.getItem('groq_key')||'';
  if(key&&key!=='YOUR_GROQ_KEY'){
    try{
      const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
        body:JSON.stringify({model:'llama3-8b-8192',messages:[{role:'system',content:'You are an expert educational assistant for Indian competitive exams. Be concise and practical.'},{role:'user',content:prompt}],max_tokens:500})
      });
      const d=await r.json();
      return d.choices?.[0]?.message?.content||demoGroq(prompt);
    }catch(e){return demoGroq(prompt);}
  }
  return demoGroq(prompt);
}
function demoGroq(p){
  const q=p.toLowerCase();
  if(q.includes('gate')||q.includes('algorithm')||q.includes('os ')||q.includes('network')) return '📘 Key Points:\n• For GATE CS, focus on previous year questions (2010-2024)\n• Algorithms: Time/Space complexity, Sorting, Trees, Graphs\n• OS: Scheduling, Memory Management, Deadlocks\n• Networks: OSI Model, TCP/IP, Routing protocols\n• Practice 3-4 hours of subject questions daily\n• Score 60+ in mock tests before exam';
  if(q.includes('ssc')||q.includes('cgl')) return '📋 SSC CGL Strategy:\n• Quant: Tables, % concepts, Geometry shortcuts\n• English: Daily vocab 10 words + Grammar rules\n• GK: NCERTs 6-10 + Monthly Current Affairs\n• Reasoning: Practice 50 questions daily\n• Attempt 80+ questions in Tier-1 for safe selection\n• Time management is key — 60 min for 100 Qs';
  if(q.includes('upsc')||q.includes('ias')||q.includes('civil')) return '🏛️ UPSC Strategy:\n• Foundation: All NCERTs 6-12 first\n• Standard Books: Laxmikant, Bipin Chandra, Shankar IAS\n• Daily: The Hindu + PIB + Yojana Magazine\n• Answer writing from Day 1 of prep\n• Mains > Prelims in priority\n• 14-16 months dedicated preparation needed';
  if(q.includes('ml')||q.includes('machine learning')||q.includes('ai')) return '🤖 ML/AI Roadmap:\n• Python: NumPy, Pandas, Matplotlib (Month 1)\n• ML: Sklearn, Regression, Classification, Clustering\n• DL: PyTorch/TensorFlow, CNNs, RNNs, Transformers\n• Projects: Kaggle competitions, GitHub portfolio\n• Papers: Attention is All You Need, ResNet, BERT\n• Target: 3 strong projects + leetcode 200+ problems';
  return '💡 Study Tips:\n• Pomodoro: 25 min focus + 5 min break cycles\n• Active recall beats passive reading 3x\n• Spaced repetition for long-term retention\n• Solve previous year papers from Day 1\n• Weekly mock tests to track progress\n• 6-8 hours quality study beats 12 hours distracted';
}

/* ── AUTH ── */
function AuthPage({role,onBack,onLogin}){
  const [mode,setMode]=useState('login');
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [name,setName]=useState('');
  const [phone,setPhone]=useState('');
  const [otp,setOtp]=useState('');
  const [adminPin,setAdminPin]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const [otpSent,setOtpSent]=useState(false);
  const validate=()=>{
    if(mode==='register'&&name.trim().length<2)return 'Name must be at least 2 characters';
    if(mode!=='otp'&&!email.includes('@'))return 'Enter a valid email';
    if(mode!=='otp'&&pass.length<6)return 'Password must be at least 6 characters';
    if(role==='admin'&&mode==='login'&&adminPin!==ADMIN_PIN)return 'Invalid admin PIN';
    return '';
  };
  const handleSubmit=async(e)=>{
    e.preventDefault();const v=validate();if(v){setErr(v);return;}
    setErr('');setLoading(true);
    try{
      if(sb&&SB_KEY!=='YOUR_SUPABASE_ANON_KEY'){
        if(mode==='register'){const {error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name,role}}});if(error)throw error;}
        else{const {error}=await sb.auth.signInWithPassword({email,password:pass});if(error)throw error;}
      }
      onLogin({email,name:name||email.split('@')[0],role});
    }catch(ex){if(SB_KEY==='YOUR_SUPABASE_ANON_KEY')onLogin({email,name:name||email.split('@')[0],role});else setErr(ex.message||'Error');}
    setLoading(false);
  };
  const handleGoogle=async()=>{if(!sb||SB_KEY==='YOUR_SUPABASE_ANON_KEY'){onLogin({email:'demo@gmail.com',name:'Demo User',role});return;}await sb.auth.signInWithOAuth({provider:'google'});};
  const sendOtp=async()=>{if(!phone||phone.length<10){setErr('Enter valid phone');return;}setLoading(true);try{if(sb&&SB_KEY!=='YOUR_SUPABASE_ANON_KEY'){const {error}=await sb.auth.signInWithOtp({phone});if(error)throw error;}setOtpSent(true);setErr('');}catch(ex){setErr(ex.message||'Failed');}setLoading(false);};
  const verifyOtp=async()=>{if(otp.length<4){setErr('Enter OTP');return;}setLoading(true);try{if(sb&&SB_KEY!=='YOUR_SUPABASE_ANON_KEY'){const {error}=await sb.auth.verifyOtp({phone,token:otp,type:'sms'});if(error)throw error;}onLogin({email:phone+'@phone.user',name:'Phone User',role});}catch(ex){if(SB_KEY==='YOUR_SUPABASE_ANON_KEY')onLogin({email:phone+'@phone.user',name:'Phone User',role});else setErr(ex.message||'Invalid OTP');}setLoading(false);};
  const icons={student:'🎓',teacher:'👩‍🏫',admin:'🛡️'};
  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#0f0c29,#302b63,#24243e)',display:'flex',alignItems:'center',justifyContent:'center',padding:20,position:'relative',overflow:'hidden'}}>
      <div className="particle" style={{width:500,height:500,top:'-20%',left:'-15%',background:'rgba(99,102,241,0.15)',filter:'blur(100px)'}}/>
      <div className="particle" style={{width:400,height:400,bottom:'-10%',right:'-10%',background:'rgba(139,92,246,0.15)',filter:'blur(80px)','--d':'9s'}}/>
      <div className="glass fade-up" style={{width:'100%',maxWidth:430,borderRadius:28,padding:'38px 34px',position:'relative',zIndex:10}}>
        <button onClick={onBack} style={{background:'none',border:'none',color:'#94a3b8',cursor:'pointer',fontSize:13,marginBottom:22,display:'flex',alignItems:'center',gap:6}}>← Back</button>
        <div style={{textAlign:'center',marginBottom:26}}>
          <div style={{fontSize:42,marginBottom:8}}>{icons[role]||'👤'}</div>
          <h2 style={{fontWeight:800,fontSize:23,color:'#fff',marginBottom:4}}>{mode==='otp'?'Phone Login':mode==='register'?'Create Account':'Welcome Back'}</h2>
          <p style={{color:'#64748b',fontSize:14}}>{role.charAt(0).toUpperCase()+role.slice(1)} Portal</p>
        </div>
        {role!=='admin'&&(
          <div style={{display:'flex',gap:6,marginBottom:22,background:'rgba(255,255,255,0.05)',borderRadius:12,padding:4}}>
            {[['login','Login'],['register','Register'],['otp','📱 OTP']].map(([m,l])=>(
              <button key={m} className={'tab-b'+(mode===m?' on':'')} style={{flex:1,fontSize:12}} onClick={()=>setMode(m)}>{l}</button>
            ))}
          </div>
        )}
        {err&&<div style={{background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.3)',borderRadius:10,padding:'10px 14px',color:'#fca5a5',fontSize:13,marginBottom:14}}>{err}</div>}
        {mode==='otp'?(
          <div>
            {!otpSent?(
              <div>
                <label style={{fontSize:13,color:'#94a3b8',display:'block',marginBottom:6}}>Phone Number</label>
                <input className="inp" type="tel" placeholder="+91 9876543210" value={phone} onChange={e=>setPhone(e.target.value)} style={{marginBottom:14}}/>
                <button className="btn btn-p" style={{width:'100%',padding:'13px',fontSize:15}} onClick={sendOtp} disabled={loading}>{loading?'⏳ Sending...':'Send OTP'}</button>
              </div>
            ):(
              <div>
                <label style={{fontSize:13,color:'#94a3b8',display:'block',marginBottom:6}}>OTP sent to {phone}</label>
                <input className="inp" type="text" placeholder="123456" maxLength={6} value={otp} onChange={e=>setOtp(e.target.value)} style={{textAlign:'center',fontSize:22,letterSpacing:8,marginBottom:14}}/>
                <button className="btn btn-p" style={{width:'100%',padding:'13px',fontSize:15}} onClick={verifyOtp} disabled={loading}>{loading?'⏳ Verifying...':'Verify OTP'}</button>
                <button style={{background:'none',border:'none',color:'#6366f1',cursor:'pointer',fontSize:13,marginTop:10,width:'100%'}} onClick={()=>setOtpSent(false)}>Resend OTP</button>
              </div>
            )}
          </div>
        ):(
          <form onSubmit={handleSubmit}>
            {mode==='register'&&<div style={{marginBottom:14}}><label style={{fontSize:13,color:'#94a3b8',display:'block',marginBottom:6}}>Full Name</label><input className="inp" type="text" placeholder="John Doe" value={name} onChange={e=>setName(e.target.value)}/></div>}
            <div style={{marginBottom:14}}><label style={{fontSize:13,color:'#94a3b8',display:'block',marginBottom:6}}>Email</label><input className="inp" type="email" placeholder="you@example.com" value={email} onChange={e=>setEmail(e.target.value)}/></div>
            <div style={{marginBottom:14}}><label style={{fontSize:13,color:'#94a3b8',display:'block',marginBottom:6}}>Password</label><input className="inp" type="password" placeholder="••••••••" value={pass} onChange={e=>setPass(e.target.value)}/></div>
            {role==='admin'&&mode==='login'&&<div style={{marginBottom:14}}><label style={{fontSize:13,color:'#94a3b8',display:'block',marginBottom:6}}>Admin PIN</label><input className="inp" type="password" placeholder="Admin PIN" value={adminPin} onChange={e=>setAdminPin(e.target.value)}/></div>}
            <button className="btn btn-p" type="submit" style={{width:'100%',padding:'13px',fontSize:15,marginBottom:12}} disabled={loading}>{loading?'⏳ Please wait...':mode==='register'?'Create Account':'Sign In'}</button>
            <div style={{position:'relative',textAlign:'center',marginBottom:12}}><div style={{height:1,background:'rgba(255,255,255,0.1)',position:'absolute',top:'50%',width:'100%'}}/><span style={{background:'rgba(15,12,41,0.8)',padding:'0 12px',color:'#64748b',fontSize:12,position:'relative'}}>or</span></div>
            <button type="button" onClick={handleGoogle} style={{width:'100%',padding:'12px',borderRadius:10,border:'1px solid rgba(255,255,255,0.15)',background:'rgba(255,255,255,0.05)',color:'#e2e8f0',cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:10}}><span style={{fontSize:18}}>🌐</span> Continue with Google</button>
          </form>
        )}
      </div>
    </div>
  );
}

/* ── STUDY ROUTINE ── */
function StudyRoutine(){
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const [slots,setSlots]=useState({
    Mon:[{time:'6-8 AM',sub:'Maths',done:false},{time:'8-10 AM',sub:'English',done:false}],
    Tue:[{time:'6-8 AM',sub:'Reasoning',done:false},{time:'8-10 AM',sub:'GK/GS',done:false}],
    Wed:[{time:'6-8 AM',sub:'Mock Test',done:false}],
    Thu:[{time:'6-8 AM',sub:'Revision',done:false},{time:'8-10 AM',sub:'Practice',done:false}],
    Fri:[{time:'6-8 AM',sub:'Current Affairs',done:false},{time:'9-11 AM',sub:'English',done:false}],
    Sat:[{time:'9-11 AM',sub:'Full Mock Test',done:false},{time:'2-4 PM',sub:'Analysis',done:false}],
    Sun:[{time:'10 AM-12 PM',sub:'Weekly Revision',done:false}],
  });
  const [activeDay,setActiveDay]=useState('Mon');
  const [newTime,setNewTime]=useState('');
  const [newSub,setNewSub]=useState('');
  const toggleDone=(day,i)=>setSlots(p=>({...p,[day]:p[day].map((s,idx)=>idx===i?{...s,done:!s.done}:s)}));
  const addSlot=()=>{if(!newTime||!newSub)return;setSlots(p=>({...p,[activeDay]:[...p[activeDay],{time:newTime,sub:newSub,done:false}]}));setNewTime('');setNewSub('');};
  const del=(day,i)=>setSlots(p=>({...p,[day]:p[day].filter((_,idx)=>idx!==i)}));
  return(
    <div>
      <div style={{marginBottom:22}}><h2 style={{fontWeight:800,fontSize:22,marginBottom:4}}>📅 Study Routine</h2><p style={{color:'var(--muted)',fontSize:14}}>Plan your daily study schedule</p></div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:20}}>
        {days.map(d=><button key={d} className={'tab-b'+(activeDay===d?' on':'')} onClick={()=>setActiveDay(d)}>{d}<span style={{fontSize:10,marginLeft:4,color:'var(--muted)'}}>({(slots[d]||[]).length})</span></button>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div className="card">
          <h3 style={{fontWeight:700,marginBottom:14,fontSize:14}}>📌 {activeDay}'s Schedule</h3>
          {(slots[activeDay]||[]).length===0&&<div style={{textAlign:'center',padding:20,color:'var(--muted)',fontSize:13}}>No slots yet. Add one →</div>}
          {(slots[activeDay]||[]).map((s,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,background:s.done?'rgba(16,185,129,0.08)':'rgba(255,255,255,0.04)',border:`1px solid ${s.done?'rgba(16,185,129,0.2)':'var(--border)'}`,marginBottom:8,transition:'all .2s'}}>
              <div onClick={()=>toggleDone(activeDay,i)} style={{width:18,height:18,borderRadius:5,border:s.done?'none':'2px solid #6366f1',background:s.done?'#10b981':'transparent',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:11,color:'#fff',flexShrink:0}}>{s.done&&'✓'}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:13,textDecoration:s.done?'line-through':'none',color:s.done?'var(--muted)':'var(--text)'}}>{s.sub}</div>
                <div style={{fontSize:11,color:'var(--muted)'}}>{s.time}</div>
              </div>
              <button onClick={()=>del(activeDay,i)} style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:15,padding:'0 4px'}}>✕</button>
            </div>
          ))}
        </div>
        <div className="card">
          <h3 style={{fontWeight:700,marginBottom:14,fontSize:14}}>➕ Add Slot</h3>
          <div style={{marginBottom:10}}><label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:5}}>Time Slot</label><input className="inp" placeholder="e.g. 6-8 AM" value={newTime} onChange={e=>setNewTime(e.target.value)}/></div>
          <div style={{marginBottom:14}}><label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:5}}>Subject</label><input className="inp" placeholder="e.g. Mathematics" value={newSub} onChange={e=>setNewSub(e.target.value)}/></div>
          <button className="btn btn-p" onClick={addSlot} style={{width:'100%'}}>Add to {activeDay}</button>
          <div style={{marginTop:16,padding:'12px',background:'rgba(99,102,241,0.08)',borderRadius:10}}>
            <div style={{fontSize:12,fontWeight:700,color:'#a5b4fc',marginBottom:8}}>📊 Weekly Summary</div>
            {days.map(d=>(
              <div key={d} style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
                <span style={{color:'var(--muted)'}}>{d}</span>
                <span style={{color:(slots[d]||[]).some(s=>s.done)?'#10b981':'var(--muted)'}}>{(slots[d]||[]).filter(s=>s.done).length}/{(slots[d]||[]).length} done</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── TASK MANAGER ── */
function TaskManager(){
  const [cols,setCols]=useState({
    todo:[{id:1,text:'Read Chapter 5',pri:'high'},{id:2,text:'Solve 30 questions',pri:'med'},{id:3,text:'Watch lecture video',pri:'low'}],
    inprog:[{id:4,text:'Practice mock test',pri:'high'}],
    done:[{id:5,text:'Read NCERT Ch 3',pri:'med'},{id:6,text:'Make revision notes',pri:'low'}],
  });
  const [input,setInput]=useState('');
  const [pri,setPri]=useState('med');
  const [drag,setDrag]=useState(null);
  const priColor={high:'#ef4444',med:'#f59e0b',low:'#10b981'};
  const addTask=()=>{if(!input.trim())return;setCols(p=>({...p,todo:[{id:Date.now(),text:input.trim(),pri},...p.todo]}));setInput('');};
  const move=(id,fromCol,toCol)=>{
    if(fromCol===toCol)return;
    const task=cols[fromCol].find(t=>t.id===id);
    setCols(p=>({...p,[fromCol]:p[fromCol].filter(t=>t.id!==id),[toCol]:[...(p[toCol]||[]),task]}));
  };
  const delTask=(col,id)=>setCols(p=>({...p,[col]:p[col].filter(t=>t.id!==id)}));
  const colDef=[{key:'todo',label:'📋 To Do',color:'#6366f1'},{key:'inprog',label:'⚡ In Progress',color:'#f59e0b'},{key:'done',label:'✅ Done',color:'#10b981'}];
  return(
    <div>
      <div style={{marginBottom:22}}><h2 style={{fontWeight:800,fontSize:22,marginBottom:4}}>📋 Task Manager</h2><p style={{color:'var(--muted)',fontSize:14}}>Kanban board for your study tasks</p></div>
      <div className="card" style={{marginBottom:20}}>
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          <input className="inp" placeholder="Add a task..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addTask()} style={{flex:1,minWidth:200}}/>
          <select className="inp" value={pri} onChange={e=>setPri(e.target.value)} style={{width:130,cursor:'pointer'}}><option value="high">🔴 High</option><option value="med">🟡 Medium</option><option value="low">🟢 Low</option></select>
          <button className="btn btn-p" onClick={addTask} style={{flexShrink:0}}>Add Task</button>
        </div>
      </div>
      <div style={{display:'flex',gap:14,overflowX:'auto',paddingBottom:10}}>
        {colDef.map(cd=>(
          <div key={cd.key} className="kanban-col">
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <span style={{fontWeight:700,fontSize:14}}>{cd.label}</span>
              <span className="badge" style={{background:`${cd.color}22`,color:cd.color}}>{(cols[cd.key]||[]).length}</span>
            </div>

/* ── WHITEBOARD (with Camera + Recording) ── */
function TeacherWhiteboard({onClose}){
  const canvasRef=useRef(null);const wrapRef=useRef(null);const videoRef=useRef(null);const mrRef=useRef(null);
  const drawRef=useRef(false);const startRef=useRef({x:0,y:0});const snapRef=useRef(null);
  const [tool,setTool]=useState('pen');const [color,setColor]=useState('#ffffff');const [bgCol,setBgCol]=useState('#1a1535');const [size,setSize]=useState(3);const [shape,setShape]=useState('rect');
  const [slides,setSlides]=useState([]);const [curSlide,setCurSlide]=useState(0);
  const [camOn,setCamOn]=useState(false);const [recording,setRecording]=useState(false);const [recChunks,setRecChunks]=useState([]);
  useEffect(()=>{
    const wrap=wrapRef.current;if(!wrap)return;
    const ro=new ResizeObserver(entries=>{
      const {width:w,height:h}=entries[0].contentRect;const c=canvasRef.current;if(!c)return;
      const ctx=c.getContext('2d');const snap=c.width>0?ctx.getImageData(0,0,c.width,c.height):null;
      c.width=Math.floor(w);c.height=Math.floor(h);ctx.fillStyle=bgCol;ctx.fillRect(0,0,c.width,c.height);
      if(snap)try{ctx.putImageData(snap,0,0);}catch(e){}
    });
    ro.observe(wrap);return()=>ro.disconnect();
  },[bgCol]);
  const getPos=e=>{const c=canvasRef.current;const r=c.getBoundingClientRect();const src=e.touches?e.touches[0]:e;return{x:(src.clientX-r.left)*(c.width/r.width),y:(src.clientY-r.top)*(c.height/r.height)};};
  const onDown=e=>{e.preventDefault();const ctx=canvasRef.current.getContext('2d');const pos=getPos(e);startRef.current=pos;drawRef.current=true;if(tool==='pen'||tool==='eraser'){ctx.beginPath();ctx.moveTo(pos.x,pos.y);}else snapRef.current=ctx.getImageData(0,0,canvasRef.current.width,canvasRef.current.height);};
  const drawShape=(ctx,x0,y0,x1,y1)=>{
    ctx.strokeStyle=color;ctx.lineWidth=size;ctx.beginPath();
    const w=x1-x0,h=y1-y0,cx=(x0+x1)/2,cy=(y0+y1)/2,r=Math.min(Math.abs(w),Math.abs(h))/2;
    if(shape==='rect')ctx.rect(x0,y0,w,h);
    else if(shape==='circle')ctx.arc(cx,cy,r,0,Math.PI*2);
    else if(shape==='line'){ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);}
    else if(shape==='arrow'){ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);const a=Math.atan2(y1-y0,x1-x0);ctx.moveTo(x1,y1);ctx.lineTo(x1-16*Math.cos(a-0.4),y1-16*Math.sin(a-0.4));ctx.moveTo(x1,y1);ctx.lineTo(x1-16*Math.cos(a+0.4),y1-16*Math.sin(a+0.4));}
    else if(shape==='triangle'){ctx.moveTo(cx,y0);ctx.lineTo(x0,y1);ctx.lineTo(x1,y1);ctx.closePath();}
    else if(shape==='diamond'){ctx.moveTo(cx,y0);ctx.lineTo(x1,cy);ctx.lineTo(cx,y1);ctx.lineTo(x0,cy);ctx.closePath();}
    else if(shape==='star'){for(let i=0;i<10;i++){const rad=Math.PI/5*i-Math.PI/2,rr=i%2===0?r:r*0.4;if(i===0)ctx.moveTo(cx+rr*Math.cos(rad),cy+rr*Math.sin(rad));else ctx.lineTo(cx+rr*Math.cos(rad),cy+rr*Math.sin(rad));}ctx.closePath();}
    else if(shape==='hexagon'){for(let i=0;i<6;i++){const rad=Math.PI/3*i-Math.PI/6;if(i===0)ctx.moveTo(cx+r*Math.cos(rad),cy+r*Math.sin(rad));else ctx.lineTo(cx+r*Math.cos(rad),cy+r*Math.sin(rad));}ctx.closePath();}
    else if(shape==='pentagon'){for(let i=0;i<5;i++){const rad=Math.PI*2/5*i-Math.PI/2;if(i===0)ctx.moveTo(cx+r*Math.cos(rad),cy+r*Math.sin(rad));else ctx.lineTo(cx+r*Math.cos(rad),cy+r*Math.sin(rad));}ctx.closePath();}
    else if(shape==='parallelogram'){ctx.moveTo(x0+w*0.2,y0);ctx.lineTo(x1,y0);ctx.lineTo(x1-w*0.2,y1);ctx.lineTo(x0,y1);ctx.closePath();}
    else ctx.rect(x0,y0,w,h);
    ctx.stroke();
  };
  const onMove=e=>{e.preventDefault();if(!drawRef.current)return;const ctx=canvasRef.current.getContext('2d');const pos=getPos(e);if(tool==='pen'){ctx.strokeStyle=color;ctx.lineWidth=size;ctx.lineCap='round';ctx.lineJoin='round';ctx.lineTo(pos.x,pos.y);ctx.stroke();}else if(tool==='eraser'){ctx.strokeStyle=bgCol;ctx.lineWidth=size*5;ctx.lineCap='round';ctx.lineTo(pos.x,pos.y);ctx.stroke();}else if(tool==='shape'){ctx.putImageData(snapRef.current,0,0);drawShape(ctx,startRef.current.x,startRef.current.y,pos.x,pos.y);}};
  const onUp=()=>{drawRef.current=false;};
  const clearBoard=()=>{const c=canvasRef.current;const ctx=c.getContext('2d');ctx.fillStyle=bgCol;ctx.fillRect(0,0,c.width,c.height);};
  const saveBoard=()=>{const a=document.createElement('a');a.download='whiteboard.png';a.href=canvasRef.current.toDataURL();a.click();};
  const uploadImg=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{const img=new Image();img.onload=()=>{const c=canvasRef.current;const ctx=c.getContext('2d');const sc=Math.min(c.width/img.width,c.height/img.height,1)*0.7;const w=img.width*sc,h=img.height*sc;ctx.drawImage(img,(c.width-w)/2,(c.height-h)/2,w,h);};img.src=ev.target.result;};reader.readAsDataURL(file);};
  const uploadSlides=e=>{Array.from(e.target.files||[]).forEach(file=>{const reader=new FileReader();reader.onload=ev=>setSlides(prev=>[...prev,ev.target.result]);reader.readAsDataURL(file);});};
  const applySlide=idx=>{const img=new Image();img.onload=()=>{const c=canvasRef.current;const ctx=c.getContext('2d');ctx.fillStyle=bgCol;ctx.fillRect(0,0,c.width,c.height);ctx.drawImage(img,0,0,c.width,c.height);};img.src=slides[idx];setCurSlide(idx);};
  const startCamera=async()=>{try{const stream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});if(videoRef.current){videoRef.current.srcObject=stream;videoRef.current.play();}setCamOn(true);}catch(e){alert('Camera access denied or not available');}};
  const stopCamera=()=>{if(videoRef.current?.srcObject){videoRef.current.srcObject.getTracks().forEach(t=>t.stop());videoRef.current.srcObject=null;}if(mrRef.current&&recording){mrRef.current.stop();}setCamOn(false);setRecording(false);};
  const startRecording=()=>{if(!videoRef.current?.srcObject)return;const chunks=[];const mr=new MediaRecorder(videoRef.current.srcObject);mr.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};mr.onstop=()=>{const blob=new Blob(chunks,{type:'video/webm'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='class-recording.webm';a.click();URL.revokeObjectURL(url);};mr.start(1000);mrRef.current=mr;setRecording(true);};
  const stopRecording=()=>{mrRef.current?.stop();setRecording(false);};
  const COLORS=['#ffffff','#ef4444','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#f97316','#000000'];
  const SHAPES=['rect','circle','line','arrow','triangle','diamond','star','hexagon','pentagon','parallelogram'];
  return(
    <div className="wb-wrap">
      <div className="wb-toolbar">
        <button className="wb-btn" onClick={onClose} style={{color:'#fca5a5'}}>✕ Close</button>
        <div className="wb-sep"/>
        {[['pen','✏️ Pen'],['eraser','🧹 Erase'],['shape','⬜ Shape']].map(([t,l])=><button key={t} className={'wb-btn'+(tool===t?' on':'')} onClick={()=>setTool(t)}>{l}</button>)}
        <div className="wb-sep"/>
        {tool==='shape'&&<select value={shape} onChange={e=>setShape(e.target.value)} style={{background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:7,padding:'5px 9px',color:'#e2e8f0',cursor:'pointer',fontSize:12}}>{SHAPES.map(s=><option key={s} value={s}>{s.charAt(0).toUpperCase()+s.slice(1)}</option>)}</select>}
        <div className="wb-sep"/>
        {COLORS.map(c=><div key={c} onClick={()=>setColor(c)} style={{width:20,height:20,borderRadius:'50%',background:c,cursor:'pointer',border:color===c?'3px solid #fff':'2px solid rgba(255,255,255,0.2)',transition:'transform .15s',transform:color===c?'scale(1.25)':'scale(1)',flexShrink:0}}/>)}
        <input type="color" value={color} onChange={e=>setColor(e.target.value)} style={{width:26,height:26,border:'none',borderRadius:6,cursor:'pointer',background:'none',flexShrink:0}}/>
        <div className="wb-sep"/>
        <span style={{fontSize:11,color:'#94a3b8',flexShrink:0}}>BG:</span>
        <input type="color" value={bgCol} onChange={e=>{setBgCol(e.target.value);clearBoard();}} style={{width:26,height:26,border:'none',borderRadius:6,cursor:'pointer',flexShrink:0}}/>
        <div className="wb-sep"/>
        <input type="range" min={1} max={20} value={size} onChange={e=>setSize(+e.target.value)} style={{width:65}}/>
        <span style={{fontSize:11,color:'#a5b4fc',flexShrink:0}}>{size}px</span>
        <div className="wb-sep"/>
        <button className="wb-btn" onClick={clearBoard}>🗑️ Clear</button>
        <button className="wb-btn" onClick={saveBoard}>💾 Save</button>
        <div className="wb-sep"/>
        <label className="wb-btn" style={{cursor:'pointer'}}>🖼️ Image<input type="file" accept="image/*" style={{display:'none'}} onChange={uploadImg}/></label>
        <label className="wb-btn" style={{cursor:'pointer'}}>📑 Slides<input type="file" accept="image/*" multiple style={{display:'none'}} onChange={uploadSlides}/></label>
        <div className="wb-sep"/>
        {!camOn?(
          <button className="wb-btn" onClick={startCamera} style={{color:'#6ee7b7'}}>📷 Camera</button>
        ):(
          <React.Fragment>
            <button className="wb-btn on" onClick={stopCamera} style={{color:'#fca5a5'}}>📷 Stop Cam</button>
            {!recording?(
              <button className="wb-btn" onClick={startRecording} style={{color:'#fcd34d',animation:'recPulse 2s infinite',borderRadius:8}}>⏺ Record</button>
            ):(
              <button className="wb-btn" onClick={stopRecording} style={{color:'#fca5a5',border:'1px solid #ef4444'}}>⏹ Stop Rec</button>
            )}
          </React.Fragment>
        )}
        {recording&&<span style={{fontSize:11,color:'#ef4444',fontWeight:700,animation:'blink 1s infinite'}}>● LIVE</span>}
      </div>
      <div style={{display:'flex',flex:1,overflow:'hidden',position:'relative'}}>
        {slides.length>0&&(
          <div style={{width:120,background:'rgba(15,12,41,0.95)',borderRight:'1px solid rgba(255,255,255,0.1)',overflowY:'auto',padding:8,display:'flex',flexDirection:'column',gap:8}}>
            {slides.map((s,i)=>(
              <div key={i} onClick={()=>applySlide(i)} style={{borderRadius:7,overflow:'hidden',border:curSlide===i?'2px solid #6366f1':'2px solid transparent',cursor:'pointer'}}>
                <img src={s} alt={'slide '+i} style={{width:'100%',display:'block'}}/>
                <div style={{fontSize:10,textAlign:'center',padding:'3px 0',color:curSlide===i?'#a5b4fc':'#64748b'}}>Slide {i+1}</div>
              </div>
            ))}
          </div>
        )}
        <div ref={wrapRef} className="wb-canvas-area">
          <canvas ref={canvasRef} onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp} onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}/>
        </div>
        {camOn&&(
          <div style={{position:'absolute',bottom:16,right:16,zIndex:10,borderRadius:12,overflow:'hidden',border:'2px solid #6366f1',boxShadow:'0 8px 32px rgba(0,0,0,0.6)',background:'#000'}}>
            <video ref={videoRef} autoPlay muted style={{width:200,height:150,display:'block',objectFit:'cover'}}/>
            {recording&&<div style={{position:'absolute',top:8,right:8,width:10,height:10,borderRadius:'50%',background:'#ef4444',animation:'blink 1s infinite'}}/>}
          </div>
        )}
      </div>
    </div>
  );
}

                <span className={'badge '+(p.status==='approved'?'bg2':p.status==='rejected'?'br':'by')}>{p.status}</span>
                {p.status==='pending'&&(
                  <React.Fragment>
                    <button className="btn" style={{background:'rgba(16,185,129,0.2)',color:'#6ee7b7',padding:'5px 11px',fontSize:12,borderRadius:8,border:'1px solid rgba(16,185,129,0.3)'}} onClick={()=>approve(i)}>✓ Approve</button>
                    <button className="btn" style={{background:'rgba(239,68,68,0.2)',color:'#fca5a5',padding:'5px 11px',fontSize:12,borderRadius:8,border:'1px solid rgba(239,68,68,0.3)'}} onClick={()=>reject(i)}>✕ Reject</button>
                  </React.Fragment>
                )}
              </div>
            </div>
          ))}
        </div>
      )}

      {tab==='books'&&(
        <div>
          <div className="card" style={{marginBottom:16}}>
            <h3 style={{fontWeight:700,marginBottom:14,fontSize:14}}>➕ Add Book with Affiliate Link</h3>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
              <div><label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:5}}>Book Title</label><input className="inp" placeholder="Clean Code" value={bookTitle} onChange={e=>setBookTitle(e.target.value)}/></div>
              <div><label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:5}}>Author</label><input className="inp" placeholder="Robert C. Martin" value={bookAuthor} onChange={e=>setBookAuthor(e.target.value)}/></div>
            </div>
            <div style={{marginBottom:12}}><label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:5}}>Amazon Affiliate Link (tag=1000673-21)</label><input className="inp" placeholder="https://www.amazon.in/...?tag=1000673-21" value={bookLink} onChange={e=>setBookLink(e.target.value)}/></div>
            <button className="btn btn-p" onClick={addBook}>Add Book to Library</button>
          </div>
          <div className="card">
            <h3 style={{fontWeight:700,marginBottom:14,fontSize:14}}>📚 Admin-Added Books</h3>
            {adminBooks.map((b,i)=>(
              <div key={b.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 12px',background:'rgba(255,255,255,0.04)',borderRadius:10,marginBottom:8}}>
                <div><div style={{fontWeight:600,fontSize:14}}>{b.title}</div><div style={{fontSize:12,color:'var(--muted)'}}>{b.author}</div></div>
                <div style={{display:'flex',gap:8}}>
                  <a href={b.affLink} target="_blank" rel="noreferrer"><button className="btn btn-g" style={{padding:'5px 12px',fontSize:12}}>View Link</button></a>
                  <button className="btn btn-r" style={{padding:'5px 12px',fontSize:12}} onClick={()=>setAdminBooks(p=>p.filter(x=>x.id!==b.id))}>Remove</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab==='upload'&&(
        <div className="card" style={{maxWidth:500}}>
          <h3 style={{fontWeight:700,marginBottom:6,fontSize:15}}>📤 Admin PDF Upload</h3>
          <p style={{color:'var(--muted)',fontSize:13,marginBottom:16}}>Upload PDFs directly to the platform (auto-approved)</p>
          <label className="btn btn-p" style={{cursor:'pointer',display:'inline-flex',alignItems:'center',gap:8,marginBottom:16}}>
            📄 Choose PDF to Upload
            <input type="file" accept=".pdf,.doc,.docx" style={{display:'none'}} onChange={handleUploadPdf}/>
          </label>
          <div style={{background:'rgba(99,102,241,0.08)',borderRadius:10,padding:14}}>
            <div style={{fontSize:13,fontWeight:700,color:'#a5b4fc',marginBottom:8}}>Recently Uploaded</div>
            {pdfs.filter(p=>p.role==='admin').map((p,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:13,padding:'6px 0',borderBottom:'1px solid var(--border)'}}><span>{p.name}</span><span className="badge bg2">{p.status}</span></div>
            ))}
            {!pdfs.filter(p=>p.role==='admin').length&&<div style={{color:'var(--muted)',fontSize:13}}>No PDFs uploaded yet</div>}
          </div>
        </div>
      )}

      {tab==='overview'&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <div className="card">
            <h3 style={{fontWeight:700,marginBottom:14,fontSize:14}}>📈 Recent Activity</h3>
            {[['User Priya signed up','2 min ago','🟢'],['PDF "DSA Notes" submitted by teacher','15 min ago','📄'],['Student uploaded Web Dev Guide','30 min ago','📤'],['Teacher Rao started whiteboard session','1 hr ago','🖌️'],['New govt job alert added','3 hr ago','🏛️']].map(([ev,t,ic])=>(
              <div key={ev} style={{display:'flex',alignItems:'flex-start',gap:9,padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                <span style={{flexShrink:0}}>{ic}</span>
                <div style={{flex:1}}><div style={{fontSize:13}}>{ev}</div><div style={{fontSize:11,color:'var(--muted)'}}>{t}</div></div>
              </div>
            ))}
          </div>
          <div className="card">
            <h3 style={{fontWeight:700,marginBottom:14,fontSize:14}}>💰 Revenue</h3>
            {[['Premium Plans','₹1.8L',75],['Book Affiliate','₹0.4L',17],['Job Listings','₹0.2L',8]].map(([lb,am,pct])=>(
              <div key={lb} style={{marginBottom:13}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:5}}><span>{lb}</span><span style={{color:'#10b981',fontWeight:700}}>{am}</span></div>
                <div style={{height:6,background:'rgba(255,255,255,0.08)',borderRadius:3}}><div style={{height:'100%',width:pct+'%',background:'linear-gradient(90deg,#10b981,#6ee7b7)',borderRadius:3}}/></div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── PROFILE ── */
function ProfilePage({user,toast,target,setTarget}){
  const [tab,setTab]=useState('profile');
  const [name,setName]=useState(user.name);
  const [bio,setBio]=useState('');
  const [apiKey,setApiKey]=useState('');
  const [groqKey,setGroqKey]=useState(localStorage.getItem('groq_key')||'');
  const tgt=TARGETS.find(t=>t.id===target);
  return(
    <div>
      <div style={{marginBottom:22}}><h2 style={{fontWeight:800,fontSize:22,marginBottom:4}}>👤 Profile</h2><p style={{color:'var(--muted)',fontSize:14}}>Manage your account settings and target</p></div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:18}}>
        {[['profile','Profile'],['target','🎯 Target'],['api','API Keys'],['billing','Billing']].map(([t,l])=><button key={t} className={'tab-b'+(tab===t?' on':'')} onClick={()=>setTab(t)}>{l}</button>)}
      </div>

      {tab==='profile'&&(
        <div style={{maxWidth:500}}>
          <div className="card">
            <div style={{display:'flex',alignItems:'center',gap:18,marginBottom:20}}>
              <div style={{width:68,height:68,borderRadius:'50%',background:'linear-gradient(135deg,#6366f1,#8b5cf6)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,fontWeight:800,color:'#fff'}}>{(name||'U')[0].toUpperCase()}</div>
              <div>
                <div style={{fontWeight:800,fontSize:17}}>{name}</div>
                <div style={{color:'var(--muted)',fontSize:13}}>{user.email}</div>
                <div style={{display:'flex',gap:6,marginTop:5,flexWrap:'wrap'}}><span className="badge bp">{user.role}</span>{tgt&&<span className="badge bb">{tgt.icon} {tgt.label}</span>}</div>
              </div>
            </div>
            <div style={{marginBottom:13}}><label style={{fontSize:13,color:'var(--muted)',display:'block',marginBottom:5}}>Full Name</label><input className="inp" value={name} onChange={e=>setName(e.target.value)}/></div>
            <div style={{marginBottom:16}}><label style={{fontSize:13,color:'var(--muted)',display:'block',marginBottom:5}}>Bio</label><textarea className="inp" rows={3} placeholder="Tell us about yourself..." value={bio} onChange={e=>setBio(e.target.value)} style={{resize:'vertical'}}/></div>
            <div style={{marginBottom:16}}><label style={{fontSize:13,color:'var(--muted)',display:'block',marginBottom:5}}>🤖 Groq API Key</label><input className="inp" type="password" placeholder="gsk_..." value={groqKey} onChange={e=>{setGroqKey(e.target.value);localStorage.setItem('groq_key',e.target.value);}}/><div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>Free key at groq.com — powers AI topic explanations</div></div>
            <button className="btn btn-p" onClick={()=>toast('Profile saved!','success')}>Save Changes</button>
          </div>
        </div>
      )}

      {tab==='target'&&(
        <div style={{maxWidth:680}}>
          <div className="card" style={{marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>Current Target</div>
            {tgt?<div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'rgba(99,102,241,0.15)',borderRadius:10,border:'1px solid rgba(99,102,241,0.3)'}}><span style={{fontSize:24}}>{tgt.icon}</span><div><div style={{fontWeight:700}}>{tgt.label}</div><div style={{fontSize:12,color:'var(--muted)'}}>{tgt.cat}</div></div></div>:<div style={{color:'var(--muted)',fontSize:13}}>No target set yet</div>}
          </div>
          {[...new Set(TARGETS.map(t=>t.cat))].map(cat=>(
            <div key={cat} style={{marginBottom:16}}>
              <div style={{fontSize:12,fontWeight:700,color:'#64748b',letterSpacing:1,marginBottom:10}}>{cat.toUpperCase()}</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:10}}>
                {TARGETS.filter(t=>t.cat===cat).map(t=>(
                  <div key={t.id} onClick={()=>{setTarget(t.id);toast('Target updated to '+t.label,'success');}} style={{display:'flex',alignItems:'center',gap:8,padding:'9px 14px',borderRadius:11,cursor:'pointer',border:target===t.id?'2px solid #6366f1':'2px solid rgba(255,255,255,0.1)',background:target===t.id?'rgba(99,102,241,0.2)':'rgba(255,255,255,0.04)',transition:'all .2s'}}>
                    <span style={{fontSize:17}}>{t.icon}</span><span style={{fontSize:13,fontWeight:target===t.id?700:400,color:target===t.id?'#a5b4fc':'var(--text)'}}>{t.label}</span>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {tab==='api'&&(
        <div style={{maxWidth:500}}>
          <div className="card">
            <h3 style={{fontWeight:700,marginBottom:6,fontSize:15}}>🔑 API Access</h3>
            <p style={{color:'var(--muted)',fontSize:13,marginBottom:15}}>Generate API keys to access CareerPilot data programmatically.</p>
            {apiKey?<div style={{marginBottom:14}}><div style={{background:'rgba(99,102,241,0.1)',border:'1px solid rgba(99,102,241,0.3)',borderRadius:10,padding:'12px',fontFamily:'monospace',fontSize:12,color:'#a5b4fc',wordBreak:'break-all'}}>{apiKey}</div><p style={{color:'var(--muted)',fontSize:12,marginTop:5}}>⚠️ Copy now — not shown again</p></div>:<div style={{background:'rgba(255,255,255,0.04)',borderRadius:10,padding:14,marginBottom:14,textAlign:'center',color:'var(--muted)',fontSize:13}}>No key generated yet</div>}
            <button className="btn btn-p" onClick={()=>{setApiKey('cp_'+Math.random().toString(36).slice(2)+Math.random().toString(36).slice(2));toast('API key generated!','success');}}>Generate New Key</button>
          </div>
        </div>
      )}

      {tab==='billing'&&(
        <div style={{maxWidth:500}}>
          <div className="card">
            <h3 style={{fontWeight:700,marginBottom:14,fontSize:15}}>💳 Current Plan</h3>
            <div style={{background:'linear-gradient(135deg,rgba(99,102,241,0.2),rgba(139,92,246,0.2))',border:'1px solid rgba(99,102,241,0.3)',borderRadius:12,padding:18,marginBottom:16}}><div style={{fontWeight:800,fontSize:17,marginBottom:3}}>🆓 Free Plan</div><div style={{color:'var(--muted)',fontSize:13}}>Access to basic features</div></div>
            {[['Basic','₹199/mo','Unlimited jobs, books and chat'],['Pro','₹499/mo','Everything + Whiteboard and API'],['Elite','₹999/mo','Everything + 1:1 mentorship']].map(([plan,price,feat])=>(
              <div key={plan} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'11px',background:'rgba(255,255,255,0.04)',borderRadius:10,marginBottom:8}}>
                <div><div style={{fontWeight:700,fontSize:14}}>{plan}</div><div style={{fontSize:12,color:'var(--muted)'}}>{feat}</div></div>
                <div style={{display:'flex',alignItems:'center',gap:9}}><span style={{fontWeight:800,color:'#a5b4fc'}}>{price}</span><button className="btn btn-p" style={{padding:'6px 13px',fontSize:12}} onClick={()=>toast(plan+' plan selected!','success')}>Upgrade</button></div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── MAIN APP SHELL ── */
function MainApp({user,target,setTarget,onLogout}){
  const [page,setPage]=useState('home');
  const [dark,setDark]=useState(true);
  const [showWB,setShowWB]=useState(false);
  const [notif,setNotif]=useState(null);
  const [notifList,setNotifList]=useState([{id:1,msg:'Welcome to CareerPilot!',time:'now',read:false}]);
  const [showNotifPanel,setShowNotifPanel]=useState(false);
  useEffect(()=>{document.body.className=dark?'':'light';},[dark]);
  const toast=(msg,type='info')=>{setNotif({msg,type});setTimeout(()=>setNotif(null),3000);};
  const addNotif=(msg)=>setNotifList(p=>[{id:Date.now(),msg,time:new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'}),read:false},...p]);
  const unread=notifList.filter(n=>!n.read).length;
  const markAllRead=()=>setNotifList(p=>p.map(n=>({...n,read:true})));
  const isTeacher=user.role==='teacher';const isAdmin=user.role==='admin';const isStudent=user.role==='student';
  const navItems=[
    {id:'home',icon:'🏠',label:'Dashboard'},
    ...(isStudent?[
      {id:'routine',icon:'📅',label:'Study Routine'},
      {id:'tasks',icon:'📋',label:'Task Manager'},
      {id:'topics',icon:'🎯',label:'Important Topics'},
      {id:'notes',icon:'📝',label:'Notes Library'},
      {id:'govtjobs',icon:'🏛️',label:'Govt Job Alerts'},
      {id:'performance',icon:'📊',label:'Performance'},
    ]:[]),
    {id:'jobs',icon:'💼',label:'Job Finder'},
    {id:'books',icon:'📚',label:'Books Library'},
    {id:'chat',icon:'💬',label:'Chat'},
    ...(isTeacher||isAdmin?[{id:'whiteboard',icon:'🖌️',label:'Whiteboard'}]:[]),
    ...(isAdmin?[{id:'admin',icon:'🛡️',label:'Admin'}]:[]),
    {id:'profile',icon:'👤',label:'Profile'},
  ];
  return(
    <div style={{display:'flex',minHeight:'100vh',background:'var(--bg)'}}>
      <aside style={{width:220,background:'var(--bg2)',borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',position:'fixed',top:0,left:0,bottom:0,zIndex:100}}>
        <div style={{padding:'16px 14px',borderBottom:'1px solid var(--border)'}}>
          <div style={{display:'flex',alignItems:'center',gap:9}}>
            <div style={{width:33,height:33,borderRadius:9,background:'linear-gradient(135deg,#6366f1,#8b5cf6)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🚀</div>
            <span style={{fontWeight:800,fontSize:15,background:'linear-gradient(135deg,#a5b4fc,#c084fc)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>CareerPilot</span>
          </div>
        </div>
        <div style={{padding:'12px 14px',borderBottom:'1px solid var(--border)'}}>
          <div style={{display:'flex',alignItems:'center',gap:9}}>
            <div style={{width:34,height:34,borderRadius:50,background:'linear-gradient(135deg,#6366f1,#8b5cf6)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:13,color:'#fff'}}>{(user.name||'U')[0].toUpperCase()}</div>
            <div style={{flex:1,overflow:'hidden'}}><div style={{fontWeight:600,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.name}</div><div style={{fontSize:11,color:'var(--muted)',textTransform:'capitalize'}}>{user.role}</div></div>
            <div style={{position:'relative',cursor:'pointer'}} onClick={()=>setShowNotifPanel(!showNotifPanel)}>
              <span style={{fontSize:18}}>🔔</span>
              {unread>0&&<div style={{position:'absolute',top:-4,right:-4,width:16,height:16,borderRadius:'50%',background:'#ef4444',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:'#fff',fontWeight:700}}>{unread}</div>}
            </div>
          </div>
          {showNotifPanel&&(
            <div style={{position:'absolute',left:14,top:100,width:270,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:14,zIndex:200,boxShadow:'0 16px 48px rgba(0,0,0,0.4)',maxHeight:300,overflow:'hidden',display:'flex',flexDirection:'column'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 14px',borderBottom:'1px solid var(--border)'}}><span style={{fontWeight:700,fontSize:13}}>🔔 Notifications</span><button style={{background:'none',border:'none',color:'#6366f1',cursor:'pointer',fontSize:12}} onClick={markAllRead}>Mark all read</button></div>
              <div style={{overflowY:'auto',flex:1}}>
                {notifList.map(n=>(
                  <div key={n.id} style={{padding:'10px 14px',borderBottom:'1px solid var(--border)',background:n.read?'transparent':'rgba(99,102,241,0.08)'}}>
                    <div style={{fontSize:13}}>{n.msg}</div>
                    <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{n.time}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
        <nav style={{flex:1,padding:'8px 7px',overflowY:'auto'}}>
          {navItems.map(n=>(
            <div key={n.id} className={'nav-i'+(page===n.id?' on':'')} onClick={()=>{if(n.id==='whiteboard'){setShowWB(true);}else{setPage(n.id);setShowNotifPanel(false);}}}>
              <span style={{fontSize:16}}>{n.icon}</span><span style={{fontSize:13}}>{n.label}</span>
            </div>
          ))}
        </nav>
        <div style={{padding:'8px 7px',borderTop:'1px solid var(--border)'}}>
          <div className="nav-i" onClick={()=>setDark(!dark)}><span style={{fontSize:16}}>{dark?'☀️':'🌙'}</span><span style={{fontSize:13}}>{dark?'Light Mode':'Dark Mode'}</span></div>
          <div className="nav-i" onClick={onLogout}><span style={{fontSize:16}}>🚪</span><span style={{fontSize:13}}>Logout</span></div>
        </div>
      </aside>
      <main style={{marginLeft:220,flex:1,padding:'24px',minHeight:'100vh',overflow:'auto'}}>
        <div className="fade-in">
          {page==='home'&&<HomeDash user={user} toast={toast} target={target}/>}
          {page==='routine'&&<StudyRoutine/>}
          {page==='tasks'&&<TaskManager/>}
          {page==='topics'&&<ImportantTopics target={target}/>}
          {page==='notes'&&<NotesLibrary/>}
          {page==='govtjobs'&&<GovtJobAlerts target={target}/>}
          {page==='performance'&&<PerformanceDash/>}
          {page==='jobs'&&<JobFinder/>}
          {page==='books'&&<BooksSection/>}
          {page==='chat'&&<ChatSection user={user}/>}
          {page==='admin'&&<AdminDashboard toast={toast} addNotif={addNotif}/>}
          {page==='profile'&&<ProfilePage user={user} toast={toast} target={target} setTarget={setTarget}/>}
        </div>
      </main>
      {showWB&&<TeacherWhiteboard onClose={()=>setShowWB(false)}/>}
      {notif&&(
        <div style={{position:'fixed',bottom:22,right:22,zIndex:9999,background:notif.type==='success'?'rgba(16,185,129,0.92)':notif.type==='error'?'rgba(239,68,68,0.92)':'rgba(99,102,241,0.92)',backdropFilter:'blur(12px)',borderRadius:12,padding:'11px 18px',color:'#fff',fontWeight:600,fontSize:14,animation:'fadeUp .3s ease',boxShadow:'0 8px 32px rgba(0,0,0,0.3)'}}>
          {notif.msg}
        </div>
      )}
    </div>
  );
}

/* ── APP ROUTER ── */
function App(){
  const [screen,setScreen]=useState('landing'); // landing|role|target|auth|app
  const [role,setRole]=useState('student');
  const [target,setTarget]=useState('gate-cs');
  const [user,setUser]=useState(null);
  const handleLogin=u=>{setUser(u);setScreen('app');};
  const handleLogout=()=>{if(sb&&SB_KEY!=='YOUR_SUPABASE_ANON_KEY')sb.auth.signOut();setUser(null);setScreen('landing');};
  if(screen==='landing') return <LandingPage onEnter={()=>setScreen('role')}/>;
  if(screen==='role')    return <RoleSelectPage onSelect={r=>{setRole(r);setScreen(r==='student'?'target':'auth');}}/>;
  if(screen==='target')  return <TargetSelectPage onSelect={t=>{setTarget(t);setScreen('auth');}} onBack={()=>setScreen('role')}/>;
  if(screen==='auth')    return <AuthPage role={role} onBack={()=>setScreen(role==='student'?'target':'role')} onLogin={handleLogin}/>;
  if(screen==='app'&&user) return <MainApp user={user} target={target} setTarget={setTarget} onLogout={handleLogout}/>;
  return <LandingPage onEnter={()=>setScreen('role')}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
